<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storyboard | Before and After</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    padding: 48px 32px 64px;
  }
  header {
    width: 100%;
    max-width: 900px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 36px;
  }
  header span {
    color: #fff;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.24em;
    text-transform: uppercase;
  }
  header .sep { color: rgba(255,255,255,0.3); font-size: 14px; }
  .slider-container {
    position: relative;
    width: 100%;
    max-width: 900px;
    overflow: hidden;
    cursor: col-resize;
    user-select: none;
    -webkit-user-select: none;
    background: #111;
  }
  .sizer { width: 100%; display: block; visibility: hidden; }
  .slider-container img.photo {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
    -webkit-user-drag: none;
  }
  .img-after { clip-path: inset(0 50% 0 0); }
  .divider-line {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 2px; height: 100%;
    background: rgba(255,255,255,0.9);
    pointer-events: none; z-index: 10;
  }
  .handle {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 48px; height: 48px;
    border-radius: 50%;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; z-index: 11;
    box-shadow: 0 2px 16px rgba(0,0,0,0.5);
  }
  .badge {
    position: absolute; top: 20px;
    padding: 5px 14px;
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.2em; text-transform: uppercase;
    pointer-events: none; z-index: 12; border-radius: 2px;
  }
  .badge-before {
    left: 20px; color: rgba(255,255,255,0.7);
    border: 1px solid rgba(255,255,255,0.25);
  }
  .badge-after {
    right: 20px; color: rgba(0,0,0,0.85);
    background: rgba(255,255,255,0.88);
  }
  .hint {
    margin-top: 18px;
    color: rgba(255,255,255,0.2);
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
  }
</style>
</head>
<body>

<header>
  <span>Storyboard</span>
  <span class="sep">|</span>
  <span>Before and After</span>
</header>

<div class="slider-container" id="slider">
  <img class="sizer" src="1_STORYBOARD.png" alt="">
  <img class="photo img-before" src="1_STORYBOARD.png" alt="Antes">
  <img class="photo img-after" id="imgAfter" src="2_STORYBOARD.png" alt="Depois">
  <div class="divider-line" id="divider"></div>
  <div class="handle" id="handle">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <path d="M7 4L2 10L7 16" stroke="#000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M13 4L18 10L13 16" stroke="#000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <span class="badge badge-before">Antes</span>
  <span class="badge badge-after">Depois</span>
</div>

<p class="hint">← arraste para comparar →</p>

<script>
  const container = document.getElementById('slider');
  const imgAfter  = document.getElementById('imgAfter');
  const divider   = document.getElementById('divider');
  const handle    = document.getElementById('handle');
  let dragging = false;

  function setPos(clientX) {
    const rect = container.getBoundingClientRect();
    let p = ((clientX - rect.left) / rect.width) * 100;
    p = Math.max(0, Math.min(100, p));
    imgAfter.style.clipPath = `inset(0 ${(100-p).toFixed(3)}% 0 0)`;
    divider.style.left = p.toFixed(3) + '%';
    handle.style.left  = p.toFixed(3) + '%';
  }

  container.addEventListener('mousedown',  e => { dragging = true; setPos(e.clientX); });
  window.addEventListener('mousemove',     e => { if (dragging) setPos(e.clientX); });
  window.addEventListener('mouseup',       () => { dragging = false; });
  container.addEventListener('touchstart', e => { dragging = true; setPos(e.touches[0].clientX); }, {passive:true});
  window.addEventListener('touchmove',     e => { if (dragging) setPos(e.touches[0].clientX); }, {passive:true});
  window.addEventListener('touchend',      () => { dragging = false; });

  window.addEventListener('load', () => {
    setPos(container.getBoundingClientRect().left + container.getBoundingClientRect().width / 2);
  });
</script>
</body>
</html>
