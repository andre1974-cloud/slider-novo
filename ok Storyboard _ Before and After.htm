<!DOCTYPE html>

<html lang="pt-BR"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storyboard | Before and After</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    padding: 48px 32px 64px;
    gap: 0;
  }

  header {
    width: 100%;
    max-width: 900px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 40px;
  }

  header span {
    color: #fff;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }

  header .sep {
    color: rgba(255,255,255,0.3);
    font-weight: 300;
    font-size: 15px;
  }

  .slider-wrapper {
    width: 100%;
    max-width: 900px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .slider-container {
    position: relative;
    width: 100%;
    aspect-ratio: 1060 / 1120;
    overflow: hidden;
    cursor: col-resize;
    user-select: none;
    -webkit-user-select: none;
    background: #000;
  }

  .slider-container img {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
    -webkit-user-drag: none;
  }

  .img-after {
    clip-path: inset(0 50% 0 0);
  }

  .divider-line {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 2px;
    height: 100%;
    background: rgba(255,255,255,0.85);
    pointer-events: none;
    z-index: 10;
  }

  .handle {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 11;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.2);
  }

  .badge {
    position: absolute;
    top: 20px;
    padding: 5px 14px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    pointer-events: none;
    z-index: 12;
  }

  .badge-before {
    left: 20px;
    color: rgba(255,255,255,0.6);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 2px;
  }

  .badge-after {
    right: 20px;
    color: rgba(0,0,0,0.8);
    background: rgba(255,255,255,0.85);
    border-radius: 2px;
  }

  .hint {
    margin-top: 20px;
    color: rgba(255,255,255,0.22);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  .upload-section {
    margin-top: 40px;
    width: 100%;
    max-width: 900px;
    display: flex;
    gap: 12px;
  }

  .upload-btn {
    flex: 1;
    padding: 14px 12px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 3px;
    color: rgba(255,255,255,0.4);
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .upload-btn:hover {
    border-color: rgba(255,255,255,0.35);
    color: rgba(255,255,255,0.75);
    background: rgba(255,255,255,0.03);
  }

  .upload-btn svg { opacity: 0.5; flex-shrink: 0; }
  .upload-btn:hover svg { opacity: 1; }

  input[type="file"] { display: none; }
</style>
</head>
<body>

<header>
  <span>Storyboard</span>
  <span class="sep">|</span>
  <span>Before and After</span>
</header>

<div class="slider-wrapper">
  <div class="slider-container" id="slider">

    <img class="img-before" id="imgBefore" src="blob:null/927d8016-c012-4875-8ef0-f3a061fea7ec" alt="Antes">

    <img class="img-after" id="imgAfter" src="blob:null/e33e6478-ad34-4a21-8f3d-89f17b1550f3" alt="Depois" style="clip-path: inset(0px 100% 0px 0px);">

    <div class="divider-line" id="divider" style="left: 0%;"></div>

    <div class="handle" id="handle" style="left: 0%;">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M7 4L2 10L7 16" stroke="#000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
        <path d="M13 4L18 10L13 16" stroke="#000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
      </svg>
    </div>

    <span class="badge badge-before">Antes</span>
    <span class="badge badge-after">Depois</span>
  </div>

  <p class="hint">← arraste para comparar →</p>
</div>

<div class="upload-section">
  <label class="upload-btn" for="uploadBefore">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M7 1v8M4 4l3-3 3 3M1 10.5v1A1.5 1.5 0 002.5 13h9A1.5 1.5 0 0013 11.5v-1" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"></path>
    </svg>
    Carregar imagem — Antes
  </label>
  <input type="file" id="uploadBefore" accept="image/*">

  <label class="upload-btn" for="uploadAfter">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M7 1v8M4 4l3-3 3 3M1 10.5v1A1.5 1.5 0 002.5 13h9A1.5 1.5 0 0013 11.5v-1" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"></path>
    </svg>
    Carregar imagem — Depois
  </label>
  <input type="file" id="uploadAfter" accept="image/*">
</div>

<script>
  const container = document.getElementById('slider');
  const imgAfter  = document.getElementById('imgAfter');
  const divider   = document.getElementById('divider');
  const handle    = document.getElementById('handle');
  let dragging = false;

  function setPos(clientX) {
    const rect = container.getBoundingClientRect();
    let p = ((clientX - rect.left) / rect.width) * 100;
    p = Math.max(0, Math.min(100, p));
    const pct = p.toFixed(3);
    imgAfter.style.clipPath = `inset(0 ${(100 - p).toFixed(3)}% 0 0)`;
    divider.style.left  = pct + '%';
    handle.style.left   = pct + '%';
  }

  container.addEventListener('mousedown',  e => { dragging = true; setPos(e.clientX); });
  window.addEventListener('mousemove',     e => { if (dragging) setPos(e.clientX); });
  window.addEventListener('mouseup',       () => { dragging = false; });

  container.addEventListener('touchstart', e => { dragging = true; setPos(e.touches[0].clientX); }, { passive: true });
  window.addEventListener('touchmove',     e => { if (dragging) setPos(e.touches[0].clientX); },   { passive: true });
  window.addEventListener('touchend',      () => { dragging = false; });

  function bindUpload(inputId, imgId) {
    document.getElementById(inputId).addEventListener('change', function() {
      if (!this.files[0]) return;
      document.getElementById(imgId).src = URL.createObjectURL(this.files[0]);
    });
  }

  bindUpload('uploadBefore', 'imgBefore');
  bindUpload('uploadAfter',  'imgAfter');

  setPos(container.getBoundingClientRect().width / 2);
</script>


</body></html>
